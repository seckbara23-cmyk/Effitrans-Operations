name: CI

# S0-INF-3 — baseline CI: install, typecheck, build on every push/PR.
# No secrets required: lib/env.ts is not imported at build time, so the build
# does not need Supabase keys. Lint is added once ESLint is configured.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  rls-tests:
    # F4 — boots local Supabase, applies migrations + seed, and runs the RLS
    # regression tests. The test SQL raises an exception on any leak/regression,
    # which (with ON_ERROR_STOP=1) fails this job. Guards tenant isolation (RLS-1)
    # and role-scope (RLS-2) so future schema changes can't silently weaken them.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies migrations + seed)
        run: supabase start

      - name: Reset DB (re-apply migrations + seed deterministically)
        run: supabase db reset

      - name: Run RLS tenant-isolation test (RLS-1)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_tenant_isolation_test.sql

      - name: Run RLS role-scope test (RLS-2)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_role_scope_test.sql

      - name: Run RLS client-module test (Phase 1.1)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_client_test.sql

      - name: Run RLS operational-file test (Phase 1.2)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_operational_file_test.sql

      - name: Run file-numbering test (Phase 1.2)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/numbering_test.sql

      - name: Run RLS tasks test (Phase 1.3)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_task_test.sql

      - name: Run RLS notifications test (Phase 1.6)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_notification_test.sql

      - name: Run RLS visibility test (Phase 1.7)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_visibility_test.sql

      - name: Run RLS documents test (Phase 1.8)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_document_test.sql

      - name: Run RLS customs test (Phase 1.9)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_customs_test.sql

      - name: Stop local Supabase
        if: always()
        run: supabase stop
