name: CI

# S0-INF-3 — baseline CI: install, typecheck, build on every push/PR.
# No secrets required: lib/env.ts is not imported at build time, so the build
# does not need Supabase keys. Lint is added once ESLint is configured.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  rls-tests:
    # F4 — boots local Supabase, applies migrations + seed, and runs the RLS
    # regression tests. The test SQL raises an exception on any leak/regression,
    # which (with ON_ERROR_STOP=1) fails this job. Guards tenant isolation (RLS-1)
    # and role-scope (RLS-2) so future schema changes can't silently weaken them.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (was `latest`) to stop upstream CLI/runtime image changes from
          # breaking CI without warning. v2.106.0 is the stable release our
          # migrations + RLS tests last ran green on. Bump deliberately after
          # verifying a newer release against `supabase start`/`db reset` locally.
          version: 2.106.0

      - name: Start local Supabase (applies migrations + seed)
        run: |
          if supabase start; then
            echo "supabase start: OK"
          else
            code=$?
            echo "::group::supabase start diagnostics"
            supabase status || true
            docker ps -a || true
            for c in $(docker ps -a --filter 'status=exited' -q); do
              echo "----- exited container logs: $(docker inspect --format '{{.Name}}' "$c") -----"
              docker logs --tail 80 "$c" 2>&1 || true
            done
            echo "::endgroup::"
            statuses="$(docker ps -a --format '{{.Names}}={{.Status}}' | tr '\n' '; ' | cut -c1-900)"
            echo "::error title=supabase start failed (exit ${code})::${statuses}"
            exit 1
          fi

      - name: Reset DB (re-apply migrations + seed deterministically)
        run: supabase db reset

      - name: Run RLS tenant-isolation test (RLS-1)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_tenant_isolation_test.sql

      - name: Run RLS role-scope test (RLS-2)
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/rls_role_scope_test.sql

      - name: Run RLS client-module test (Phase 1.1)
