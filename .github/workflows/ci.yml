name: CI

# S0-INF-3 — baseline CI: install, typecheck, build on every push/PR.
# No secrets required: lib/env.ts is not imported at build time, so the build
# does not need Supabase keys. Lint is added once ESLint is configured.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
